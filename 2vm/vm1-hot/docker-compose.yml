# ============================================================
# VM-1 热数据节点部署配置
# 部署在 UIS 虚拟机上
# 服务: MinIO热存储 + Nginx负载均衡 + 雷达模拟器 + 监控
# 数据盘: /data/nvme1, /data/nvme2 (OneStor高性能NVMe卷)
# ============================================================

networks:
  radar-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24

volumes:
  hot-data-1:
  hot-data-2:

services:
  # ── MinIO 热存储 ──
  minio-hot:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: minio-hot
    hostname: minio-hot
    networks:
      radar-net:
        ipv4_address: 172.20.1.10
    volumes:
      - /data/nvme1:/data1     # OneStor NVMe 高性能卷
      - /data/nvme2:/data2     # OneStor NVMe 高性能卷
    environment:
      - MINIO_ROOT_USER=radaradmin
      - MINIO_ROOT_PASSWORD=RadarAdmin@2024!
      - MINIO_SITE_REGION=cn-east-1
    command: server /data1 /data2 --console-address ":9001"
    ports:
      - "9010:9000"      # S3 API
      - "19110:9001"     # Console
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Nginx 负载均衡 ──
  nginx-lb:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    hostname: nginx-lb
    networks:
      radar-net:
        ipv4_address: 172.20.1.30
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:18080"     # S3 API 入口
      - "18081:18081"     # Console 入口
    depends_on:
      - minio-hot
    restart: unless-stopped

  # ── MinIO 初始化（启动后自动退出） ──
  mc-init:
    image: minio/mc:latest
    container_name: mc-init
    networks:
      radar-net:
        ipv4_address: 172.20.1.50
    volumes:
      - ../ilm:/ilm:ro
      - ../scripts/init-vm1.sh:/init.sh:ro
    depends_on:
      minio-hot:
        condition: service_healthy
    entrypoint: sh -c "sh /init.sh"
    restart: "no"

  # ── 雷达模拟器 ──
  radar-simulator:
    image: python:3.11-alpine
    container_name: radar-simulator
    networks:
      radar-net:
        ipv4_address: 172.20.1.60
    volumes:
      - ../scripts/radar_simulator.py:/scripts/radar_simulator.py:ro
    depends_on:
      - mc-init
    environment:
      - MINIO_ENDPOINT=nginx-lb:18080
      - MINIO_ACCESS_KEY=radar-simulator
      - MINIO_SECRET_KEY=RadarSim@2024!
      - RADAR_COUNT=20
      - SIMULATION_INTERVAL=30
    command: sh -c "pip install -q boto3 numpy && python3 /scripts/radar_simulator.py"
    restart: unless-stopped

  # ── 监控面板 ──
  monitor:
    image: python:3.11-alpine
    container_name: radar-monitor
    networks:
      radar-net:
        ipv4_address: 172.20.1.70
    volumes:
      - ../scripts/monitor_server.py:/scripts/monitor.py:ro
    depends_on:
      - minio-hot
    environment:
      - MINIO_ENDPOINT=http://nginx-lb:18080
      - MINIO_ACCESS_KEY=radar-simulator
      - MINIO_SECRET_KEY=RadarSim@2024!
    command: sh -c "pip install -q boto3 flask && python3 /scripts/monitor.py"
    ports:
      - "8888:8888"
    restart: unless-stopped
