# ============================================================
# Nginx 负载均衡配置（部署在 VM-1）
# 仅代理热数据 MinIO 节点
# ============================================================
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    client_max_body_size 0;

    upstream minio-hot {
        server minio-hot:9000 max_fails=3 fail_timeout=30s;
    }

    upstream minio-hot-console {
        server minio-hot:9001 max_fails=3 fail_timeout=30s;
    }

    # ── S3 API 入口 ──
    server {
        listen 18080;

        location / {
            proxy_pass http://minio-hot;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
    }

    # ── MinIO Console 入口 ──
    server {
        listen 18081;

        location / {
            proxy_pass http://minio-hot-console;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
