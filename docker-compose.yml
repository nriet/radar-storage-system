# ============================================================
# 📡 雷达数据存储系统
# 方案 A：单虚拟机部署（开发 / 测试环境）
#
# 架构：UIS VM + OneStor 分布式块存储
# 6 个容器：MinIO热 + MinIO冷 + Nginx + 初始化 + 模拟器 + 监控
# 含雷达模拟器，部署后自动写入数据验证功能
#
# 启动：./manage.sh start
# ============================================================

networks:
  radar-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
  thredds-data:

services:

  # ──────────────────────────────────────────────────────────
  # 1. MinIO 热存储（NVMe）
  #    - 实时雷达数据写入目标
  #    - 单盘模式，冗余由 OneStor 底层保障
  #    - 生产环境挂载到 /data (热数据盘)
  #    - 端口 9010(S3) 供 Nginx 代理，19110(Console) 供运维
  # ──────────────────────────────────────────────────────────
  minio-hot:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: minio-hot
    hostname: minio-hot
    networks:
      radar-net:
        ipv4_address: 172.20.0.10
    volumes:
      - /data/minio:/data              # 热数据盘
    environment:
      - MINIO_ROOT_USER=radaradmin
      - MINIO_ROOT_PASSWORD=RadarAdmin@2024!
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"    # S3 API（数据读写）
      - "19110:9001"   # Web Console（管理）
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 2. MinIO 冷存储（HDD）
  #    - 长期归档，存储 ILM 过渡过来的冷数据
  #    - 生产环境挂载到 /data_archive (冷数据盘)
  #    - 生产方案B中，此容器独立部署在 VM-2
  # ──────────────────────────────────────────────────────────
  minio-cold:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: minio-cold
    hostname: minio-cold
    networks:
      radar-net:
        ipv4_address: 172.20.0.20
    volumes:
      - /data_archive/minio:/data       # 冷数据盘
    environment:
      - MINIO_ROOT_USER=radaradmin
      - MINIO_ROOT_PASSWORD=RadarAdmin@2024!
    command: server /data --console-address ":9001"
    ports:
      - "9020:9000"    # S3 API（冷数据访问）
      - "19220:9001"   # Web Console
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 3. Redis 元数据引擎（JuiceFS 使用）
  #    - 为 JuiceFS 提供分布式元数据存储
  #    - 如不使用 JuiceFS 可注释掉此服务
  #    - 端口 6379，AOF 持久化
  # ──────────────────────────────────────────────────────────
  redis-meta:
    image: redis:7-alpine
    container_name: redis-meta
    hostname: redis-meta
    networks:
      radar-net:
        ipv4_address: 172.20.0.25
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"    # Redis 端口
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 4. Nginx 负载均衡
  #    - 雷达设备唯一 S3 入口，代理到 minio-hot
  #    - least_conn 算法，大文件传输不缓冲
  #    - 端口 18080(S3 API) 供雷达写入，18081(Console) 运维入口
  # ──────────────────────────────────────────────────────────
  nginx-lb:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    hostname: nginx-lb
    networks:
      radar-net:
        ipv4_address: 172.20.0.30
    volumes:
      - ./single/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:18080"   # 雷达数据 S3 入口
      - "18081:18081"   # MinIO Console 入口
    depends_on:
      - minio-hot
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 5. MinIO 初始化（一次性任务）
  #    - 依赖 minio-hot 健康后才启动
  #    - 执行 init.sh：创建桶 → 配置分层 → 设置 ILM → 建账号
  #    - 完成后容器 exit（restart: "no"）
  # ──────────────────────────────────────────────────────────
  mc-init:
    image: minio/mc:latest
    container_name: mc-init
    networks:
      radar-net:
        ipv4_address: 172.20.0.50
    volumes:
      - ./single/ilm:/ilm:ro            # ILM 策略文件
      - ./single/scripts/init.sh:/init.sh:ro   # 初始化脚本
    depends_on:
      minio-hot:
        condition: service_healthy
    entrypoint: sh -c "sh /init.sh"
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # 6. 雷达数据模拟器（仅测试环境）
  #    - 模拟 20 部雷达写入数据到 MinIO
  #    - 4 种雷达类型：weather / surveillance / imaging / tracking
  #    - 可调整 RADAR_COUNT 环境变量 (1~50)
  #    - ⚠️ 生产环境不部署此容器
  # ──────────────────────────────────────────────────────────
  radar-simulator:
    image: python:3.11-alpine
    container_name: radar-simulator
    networks:
      radar-net:
        ipv4_address: 172.20.0.60
    volumes:
      - ./single/scripts/radar_simulator.py:/app/radar_simulator.py:ro
    depends_on:
      - mc-init
    environment:
      - MINIO_ENDPOINT=nginx-lb:18080      # 通过 Nginx 写入
      - MINIO_ACCESS_KEY=radar-simulator
      - MINIO_SECRET_KEY=RadarSim@2024!
      - RADAR_COUNT=20                      # 模拟雷达数量
      - SIMULATION_INTERVAL=30              # 上报间隔（秒）
    command: sh -c "pip install -q boto3 numpy && python3 /app/radar_simulator.py"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 7. 监控面板
  #    - Web 实时监控：桶数量、对象数、数据量、上传活动
  #    - Flask 服务，自动刷新
  #    - 提供 /api/status JSON 接口供外部集成
  # ──────────────────────────────────────────────────────────
  monitor:
    image: python:3.11-alpine
    container_name: radar-monitor
    networks:
      radar-net:
        ipv4_address: 172.20.0.70
    volumes:
      - ./single/scripts/monitor_server.py:/app/monitor.py:ro
    depends_on:
      - minio-hot
    environment:
      - MINIO_ENDPOINT=http://nginx-lb:18080
      - MINIO_ACCESS_KEY=radar-simulator
      - MINIO_SECRET_KEY=RadarSim@2024!
    command: sh -c "pip install -q boto3 flask && python3 /app/monitor.py"
    ports:
      - "8888:8888"    # Web 监控面板
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 8. s3fs MinIO挂载 — 将 MinIO 桶映射为本地目录
  #    供 THREDDS 直接读取，数据入 MinIO 后自动可见
  #    需要: privileged + /dev/fuse
  # ──────────────────────────────────────────────────────────
  s3fs:
    build: ./docker/s3fs
    container_name: s3fs-mount
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    environment:
      - S3_BUCKET=radar-data
      - S3_ENDPOINT=http://minio-hot:9000
      - S3_ACCESS_KEY=radaradmin
      - S3_SECRET_KEY=RadarAdmin@2024!
      - S3_MOUNT=/mnt
      - S3FS_OPTS=-o use_path_request_style -o allow_other -o umask=000 -o dbglevel=warn
    volumes:
      - thredds-data:/mnt:shared
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 9. THREDDS 数据服务 — 卫星/雷达数据 Web 发布
  #    OPeNDAP / WMS / HTTPServer / NCISO
  #    数据源: s3fs 挂载的 MinIO 桶 (thredds-data volume)
  # ──────────────────────────────────────────────────────────
  thredds:
    image: unidata/thredds-docker:5.8
    container_name: thredds
    volumes:
      - thredds-data:/usr/local/tomcat/content/thredds:shared
    ports:
      - "8080:8080"
    depends_on:
      - s3fs
    restart: unless-stopped
