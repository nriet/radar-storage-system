# ============================================================
# VM-1 热数据节点 docker-compose（生产环境）
# 服务: MinIO热存储 + Nginx + 监控
# 数据盘: OneStor NVMe块存储卷 → /data/nvme1, /data/nvme2
# 规格: 4核 / 32 GB
# ============================================================

networks:
  radar-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24

services:
  # ── MinIO 热存储 ──
  minio-hot:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: minio-hot
    hostname: minio-hot
    networks:
      radar-net:
        ipv4_address: 172.20.1.10
    volumes:
      - /data/nvme1:/data1
      - /data/nvme2:/data2
    environment:
      - MINIO_ROOT_USER=radaradmin
      - MINIO_ROOT_PASSWORD=RadarAdmin@2024!
      - MINIO_SITE_REGION=cn-east-1
    command: server /data1 /data2 --console-address ":9001"
    ports:
      - "9010:9000"
      - "19110:9001"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s; timeout: 3s; retries: 3; start_period: 20s
    restart: unless-stopped

  # ── Nginx 负载均衡 ──
  nginx-lb:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    hostname: nginx-lb
    networks:
      radar-net:
        ipv4_address: 172.20.1.30
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:18080"     # S3 API（雷达设备入口）
      - "18081:18081"     # Console（运维入口）
    depends_on:
      - minio-hot
    restart: unless-stopped

  # ── 初始化（部署时执行一次，完成后 exit） ──
  mc-init:
    image: minio/mc:latest
    container_name: mc-init
    networks:
      radar-net:
        ipv4_address: 172.20.1.50
    volumes:
      - ../ilm:/ilm:ro
      - ../scripts/init.sh:/init.sh:ro
    depends_on:
      minio-hot:
        condition: service_healthy
    environment:
      - COLD_NODE_IP
    entrypoint: sh -c "sh /init.sh"
    restart: "no"

  # ── 监控面板 ──
  monitor:
    image: python:3.11-alpine
    container_name: radar-monitor
    networks:
      radar-net:
        ipv4_address: 172.20.1.70
    volumes:
      - ../scripts/monitor_server.py:/app/monitor.py:ro
    depends_on:
      - minio-hot
    environment:
      - MINIO_ENDPOINT=http://nginx-lb:18080
      - MINIO_ACCESS_KEY=radar-monitor
      - MINIO_SECRET_KEY=RadarMon@2024!
    command: sh -c "pip install -q boto3 flask && python3 /app/monitor.py"
    ports:
      - "8888:8888"
    restart: unless-stopped
