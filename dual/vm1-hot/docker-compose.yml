# ============================================================
# 📡 雷达数据存储系统
# 方案 B：双虚拟机部署 — VM-1 热数据节点（生产环境）
#
# 5 个容器：MinIO热 + Redis(JuiceFS元数据) + Nginx + 初始化 + 监控
# 不含雷达模拟器
#
# 部署：bash deploy.sh vm1
# 初始化：export COLD_NODE_IP=<VM-2-IP> && bash deploy.sh init
# ============================================================

networks:
  radar-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24

services:

  # ──────────────────────────────────────────────────────────
  # 1. MinIO 热存储 — OneStor NVMe 卷
  # ──────────────────────────────────────────────────────────
  minio-hot:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: minio-hot
    hostname: minio-hot
    networks:
      radar-net:
        ipv4_address: 172.20.1.10
    volumes:
      - /data/nvme:/data     # OneStor NVMe 卷
    environment:
      - MINIO_ROOT_USER=radaradmin
      - MINIO_ROOT_PASSWORD=RadarAdmin@2024!
      - MINIO_SITE_REGION=cn-east-1
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"    # S3 API
      - "19110:9001"   # Web Console
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 2. Redis 元数据引擎（JuiceFS 使用）
  #    如不启用 JuiceFS 可注释掉此服务
  # ──────────────────────────────────────────────────────────
  redis-meta:
    image: redis:7-alpine
    container_name: redis-meta
    hostname: redis-meta
    networks:
      radar-net:
        ipv4_address: 172.20.1.25
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 3. Nginx 负载均衡 — 雷达设备统一 S3 入口
  # ──────────────────────────────────────────────────────────
  nginx-lb:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    hostname: nginx-lb
    networks:
      radar-net:
        ipv4_address: 172.20.1.30
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:18080"   # S3 API — 雷达设备数据入口
      - "18081:18081"   # Console — 运维入口
    depends_on:
      - minio-hot
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # 4. 初始化 — 一次性任务：桶+分层+ILM+账号
  # ──────────────────────────────────────────────────────────
  mc-init:
    image: minio/mc:latest
    container_name: mc-init
    networks:
      radar-net:
        ipv4_address: 172.20.1.50
    volumes:
      - ../ilm:/ilm:ro
      - ../scripts/init.sh:/init.sh:ro
    depends_on:
      minio-hot:
        condition: service_healthy
    environment:
      - COLD_NODE_IP
    entrypoint: sh -c "sh /init.sh"
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # 5. 监控面板 — http://VM-1-IP:8888
  # ──────────────────────────────────────────────────────────
  monitor:
    image: python:3.11-alpine
    container_name: radar-monitor
    networks:
      radar-net:
        ipv4_address: 172.20.1.70
    volumes:
      - ../scripts/monitor_server.py:/app/monitor.py:ro
    depends_on:
      - minio-hot
    environment:
      - MINIO_ENDPOINT=http://nginx-lb:18080
      - MINIO_ACCESS_KEY=radar-monitor
      - MINIO_SECRET_KEY=RadarMon@2024!
    command: sh -c "pip install -q boto3 flask && python3 /app/monitor.py"
    ports:
      - "8888:8888"
    restart: unless-stopped

volumes:
  redis-data:
