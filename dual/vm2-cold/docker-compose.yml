# ============================================================
# VM-2 冷数据节点 docker-compose
# 服务: MinIO 纯存储节点
# 数据盘: /data/hdd1, /data/hdd2 (OneStor HDD 大容量卷)
# 规格: 4核 / 16 GB
# ============================================================

networks:
  radar-net:
    driver: bridge

services:
  minio-cold:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: minio-cold
    hostname: minio-cold
    networks:
      - radar-net
    volumes:
      - /data/hdd1:/data1
      - /data/hdd2:/data2
    environment:
      - MINIO_ROOT_USER=radaradmin
      - MINIO_ROOT_PASSWORD=RadarAdmin@2024!
      - MINIO_SITE_REGION=cn-east-1
    command: server /data1 /data2 --console-address ":9001"
    ports:
      - "9020:9000"
      - "19220:9001"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
