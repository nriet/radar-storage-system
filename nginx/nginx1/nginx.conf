# ============================================================
# Nginx Load Balancer 主节点配置
# 为4节点MinIO集群提供负载均衡
# ============================================================
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 最大打开文件数
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式 - 包含上游节点信息
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: "$upstream_addr" '
                    'upstream_time: $upstream_response_time';

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 2048;
    server_tokens off;

    # 代理缓冲区优化 (MinIO大文件传输)
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    client_max_body_size 0;  # 无限制，支持大文件上传

    # 上游配置 - MinIO集群节点
    upstream minio-s3 {
        least_conn;  # 最少连接数算法，适合大文件传输
        keepalive 32;

        server minio-node1:9000 max_fails=3 fail_timeout=30s weight=1;
        server minio-node2:9000 max_fails=3 fail_timeout=30s weight=1;
        server minio-node3:9000 max_fails=3 fail_timeout=30s weight=1;
        server minio-node4:9000 max_fails=3 fail_timeout=30s weight=1;
    }

    upstream minio-console {
        ip_hash;  # 会话保持，Console需要

        server minio-node1:9001 max_fails=3 fail_timeout=30s;
        server minio-node2:9001 max_fails=3 fail_timeout=30s;
        server minio-node3:9001 max_fails=3 fail_timeout=30s;
        server minio-node4:9001 max_fails=3 fail_timeout=30s;
    }

    include /etc/nginx/conf.d/*.conf;
}
