# ============================================================
# MinIO S3 API 负载均衡
# 端口: 18080
# ============================================================
server {
    listen 18080;
    server_name radar-minio.local;

    # 访问日志
    access_log /var/log/nginx/minio-s3-access.log main;
    error_log /var/log/nginx/minio-s3-error.log warn;

    # CORS 配置 (雷达设备跨域访问)
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Amz-*";
    add_header Access-Control-Expose-Headers "ETag, x-amz-*";
    add_header X-Node "nginx-lb1" always;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # DNS解析缓存
    resolver 127.0.0.11 valid=30s;

    # S3 API 代理
    location / {
        # 限制请求方法
        limit_except GET HEAD PUT POST DELETE OPTIONS {
            deny all;
        }

        proxy_pass http://minio-s3;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置 (雷达大文件传输)
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 健康检查 (MinIO集群状态)
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        # 文件上传优化
        chunked_transfer_encoding on;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================
# MinIO Console 负载均衡
# 端口: 18081
# ============================================================
server {
    listen 18081;
    server_name radar-minio-console.local;

    access_log /var/log/nginx/minio-console-access.log main;
    error_log /var/log/nginx/minio-console-error.log warn;

    add_header X-Node "nginx-lb1" always;

    location / {
        proxy_pass http://minio-console;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (Console需要)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
