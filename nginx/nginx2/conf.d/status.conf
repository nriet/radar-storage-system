# ============================================================
# Nginx 状态监控页面 (备用节点)
# ============================================================
server {
    listen 19090;
    server_name localhost;

    access_log off;

    location /status {
        stub_status on;
        allow all;
    }

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
