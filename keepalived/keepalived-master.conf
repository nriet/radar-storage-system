# ============================================================
# Keepalived 主节点配置
# 虚拟IP: 172.20.0.100
# ============================================================
global_defs {
    router_id RADAR_LB_MASTER
    enable_script_security
    script_user root
}

# 健康检查脚本 - 检查MinIO集群状态
vrrp_script check_minio_cluster {
    script "/usr/local/bin/check_minio.sh"
    interval 5          # 每5秒检查一次
    timeout 3           # 超时3秒
    weight -50          # 失败时优先级减50
    rise 2              # 连续2次成功才认为恢复
    fall 3              # 连续3次失败才认为宕机
}

# Nginx进程监控
vrrp_script check_nginx {
    script "pidof nginx"
    interval 2
    timeout 2
    weight -20
}

# VIP配置
vrrp_instance VI_RADAR {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 150                    # 主节点优先级高
    advert_int 1                    # 通告间隔1秒
    
    # 认证
    authentication {
        auth_type PASS
        auth_pass RadarVIP@2024
    }

    # 虚拟IP地址
    virtual_ipaddress {
        172.20.0.100/16 dev eth0 label eth0:vip
    }

    # 追踪脚本
    track_script {
        check_minio_cluster
        check_nginx
    }

    # 通知脚本
    notify_master "/usr/local/bin/notify.sh MASTER"
    notify_backup "/usr/local/bin/notify.sh BACKUP"
    notify_fault "/usr/local/bin/notify.sh FAULT"

    # 组播地址
    # 使用224.0.0.18 (VRRP默认组播地址)
    
    # 抢占模式
    preempt
    preempt_delay 10    # 延迟10秒抢占，避免频繁切换
}
