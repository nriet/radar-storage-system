# ============================================================
# Keepalived 备用节点配置
# ============================================================
global_defs {
    router_id RADAR_LB_BACKUP
    enable_script_security
    script_user root
}

vrrp_script check_minio_cluster {
    script "/usr/local/bin/check_minio.sh"
    interval 5
    timeout 3
    weight -50
    rise 2
    fall 3
}

vrrp_script check_nginx {
    script "pidof nginx"
    interval 2
    timeout 2
    weight -20
}

vrrp_instance VI_RADAR {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100                    # 备用节点优先级较低
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass RadarVIP@2024
    }

    virtual_ipaddress {
        172.20.0.100/16 dev eth0 label eth0:vip
    }

    track_script {
        check_minio_cluster
        check_nginx
    }

    notify_master "/usr/local/bin/notify.sh MASTER"
    notify_backup "/usr/local/bin/notify.sh BACKUP"
    notify_fault "/usr/local/bin/notify.sh FAULT"

    # 非抢占模式
    nopreempt
}
